project:
  seed: 0

data:
  dataset_id: zippyz/cats-and-dogs-breeds-classification-oxford-dataset
  raw_dir: data/raw/images
  processed_dir: data/processed
  selected_breeds:
    - Sphynx
    - Siamese
    - Russian_Blue
    - Bengal
    - pug
    - great_pyrenees
    - shiba_inu
    - yorkshire_terrier
    # - Abyssinian
    # - British_Shorthair
    # - Egyptian_Mau
    # - Maine_Coon
    # - miniature_pinscher
    # - Persian
    # - basset_hound
    # - beagle
    # - havanese
    # - japanese_chin
    # - keeshond
    # - newfoundland
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  image_size: 224
  num_workers: 0

training:
  model_name: resnet18
  batch_size: 32
  epochs: 15
  learning_rate: 0.0003
  weight_decay: 0.0001
  use_class_weights: true
  early_stopping_patience: 4
  freeze_backbone: false
  device: cuda
  gpu_id: 0

fine_tuning:
  search_space:
    learning_rate: [0.0001, 0.0002, 0.0003, 0.0005]
    weight_decay: [0.00001, 0.0001, 0.0005]
    batch_size: [16, 32, 64]
    epochs: [10, 15, 20, 25]
    early_stopping_patience: [5, 10]
  optuna:
    startup_trials: 6
    warmup_epochs: 5
    pruning_interval_steps: 1

paths:
  checkpoint_dir: outputs/checkpoints/resnet18

inference:
  top_k: 3
