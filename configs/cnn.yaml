project:
  seed: 0

data:
  dataset_id: zippyz/cats-and-dogs-breeds-classification-oxford-dataset
  raw_dir: data/raw/images
  processed_dir: data/processed
  selected_breeds:
    - Sphynx
    - Siamese
    - Russian_Blue
    - Bengal
    - pug
    - great_pyrenees
    - shiba_inu
    - yorkshire_terrier
    # - Abyssinian
    # - British_Shorthair
    # - Egyptian_Mau
    # - Maine_Coon
    # - miniature_pinscher
    # - Persian
    # - basset_hound
    # - beagle
    # - havanese
    # - japanese_chin
    # - keeshond
    # - newfoundland
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  image_size: 224
  num_workers: 0

training:
  model_name: custom_cnn
  batch_size: 16
  epochs: 30
  learning_rate: 0.0003
  weight_decay: 0.0002
  use_class_weights: true
  early_stopping_patience: 4
  freeze_backbone: false
  device: cuda
  gpu_id: 0

fine_tuning:
  search_space:
    learning_rate: [0.001, 0.0005, 0.0003]
    weight_decay: [0.0001, 0.0002, 0.0005, 0.001]
    batch_size: [16, 32, 64]
    epochs: [15, 20, 25]
    early_stopping_patience: [5, 10]
    conv_channels:
      - [32, 64, 128, 256]
      - [32, 64, 128, 128]
      - [32, 64, 128, 256, 256]
    hidden_dim: [128, 192, 256]
    feature_dropout: [0.2, 0.3, 0.4]
    classifier_dropout: [0.1, 0.2, 0.3]
  optuna:
    startup_trials: 30
    warmup_epochs: 5
    pruning_interval_steps: 1

paths:
  checkpoint_dir: outputs/checkpoints/cnn

inference:
  top_k: 3
